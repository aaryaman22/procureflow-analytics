spring.application.name=procureflow-analytics

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/event_analytics
spring.datasource.username=postgres
spring.datasource.password=Test@123

# JPA — creates the events table from EventEntity (dev only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
app.kafka.topic.procurement-events=procurement-events
app.kafka.topic.procurement-events-dlq=procurement-events-dlq

spring.kafka.consumer.group-id=event-analytics-group
spring.kafka.consumer.auto-offset-reset=earliest
# Consumer deserializers are configured in KafkaConfig (ErrorHandlingDeserializer + JsonDeserializer)

# Disable unused infra for Phase 1 foundation
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

management.endpoints.web.exposure.include=health,info
