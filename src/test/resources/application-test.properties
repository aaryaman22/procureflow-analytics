# EmbeddedKafka broker address (set by @EmbeddedKafka at runtime)
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}

# Local PostgreSQL (must be running before mvn test)
spring.datasource.url=jdbc:postgresql://localhost:5432/event_analytics
spring.datasource.username=postgres
spring.datasource.password=Test@123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.kafka.topic.procurement-events=procurement-events
app.kafka.topic.procurement-events-dlq=procurement-events-dlq

# Isolated consumer group for integration tests
spring.kafka.consumer.group-id=event-analytics-integration-test
spring.kafka.consumer.auto-offset-reset=earliest

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
